databaseChangeLog:
  - changeSet:
      id: schema2
      author: family-tree
      changes:
        - sqlFile:
            path: changesets/001-baseline.sql
            relativeToChangelogFile: true
            splitStatements: false
      rollback:
        - sql: 'drop trigger if exists notify_access_granted_trg on person'
        - sql: 'drop function if exists public.request_access cascade'
        - sql: 'drop function if exists public.notify_access_granted cascade'
        - sql: 'drop function if exists public.notify_access_request cascade'
        - sql: 'drop function if exists public.send_access_email cascade'
        - sql: 'drop function if exists public.send_email cascade'
        - sql: 'drop function if exists public.guard_person_flags cascade'
        - sql: 'drop function if exists public.bootstrap_owner cascade'
        - sql: 'drop function if exists public.is_admin cascade'
        - sql: 'drop function if exists public.is_approved cascade'
        - sql: 'drop table if exists app_settings cascade'
        - sql: 'drop table if exists parent_child cascade'
        - sql: 'drop table if exists marriage cascade'
        - sql: 'drop table if exists person cascade'
  - changeSet:
      id: access-config
      author: family-tree
      runOnChange: true
      changes:
        - sqlFile:
            path: changesets/002-config.sql
            relativeToChangelogFile: true
  - changeSet:
      id: app-user-split
      author: family-tree
      changes:
        - sqlFile:
            path: changesets/003-app-user.sql
            relativeToChangelogFile: true
            splitStatements: false
      rollback:
        - sql: 'drop table if exists app_user cascade'
  - changeSet:
      id: mailtrap-send
      author: family-tree
      runOnChange: true
      changes:
        - sqlFile:
            path: changesets/004-mailtrap.sql
            relativeToChangelogFile: true
            splitStatements: false
  - changeSet:
      id: open-access
      author: family-tree
      runOnChange: true
      changes:
        - sqlFile:
            path: changesets/005-open-access.sql
            relativeToChangelogFile: true
            splitStatements: false
